spring:
  application:
    name: spring-batch-kafka-poc

  batch:
    job:
      enabled: false   # we launch jobs explicitly (Kafka listener / REST), not on startup

  datasource:
    url: jdbc:mysql://localhost:3306/batchpoc?createDatabaseIfNotExist=true
    username: batchuser
    password: batchpass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # POC convenience only -- use validate/none + migrations in real projects
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: batch-poc-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.adipta.batchkafka.kafka"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    org.springframework.batch: DEBUG
    com.adipta.batchkafka: DEBUG